.size-chip:hover { border-color: var(--rose); }
.size-chip--active { background: var(--ink); border-color: var(--ink); color: white; }

.shape-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap:8px; }
.shape-chip { display:flex; flex-direction:column; align-items:center; gap:6px; padding: 10px 6px; border-radius: 10px; border: 1px solid var(--line); background: white; cursor:pointer; }
.shape-chip span { font-size: 10.5px; color:#6D6578; text-align:center; line-height:1.2; }
.shape-chip:hover { border-color: var(--rose); }
.shape-chip--active { border-color: var(--ink); background: rgba(36,30,51,0.04); }
.shape-chip--active span { color: var(--ink); font-weight:600; }

.layout-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
.layout-list li { display:flex; align-items:center; gap:10px; padding: 8px; border-radius:10px; border: 1px solid transparent; }
.layout-list li.layout-active { border-color: var(--rose); background: rgba(184,92,107,0.05); }

.strand-picker-list { display:flex; flex-direction:column; gap:14px; margin-bottom: 16px; }
.strand-picker-row { display:flex; flex-direction:column; gap:10px; padding: 12px; border-radius:10px; border:1px solid var(--line); }
.strand-picker-row-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.strand-picker-label { font-size:13.5px; font-weight:500; }
.strand-picker-preview { display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-height: 34px; }
.layout-preview { display:flex; align-items:center; gap:2px; min-width: 130px; flex-wrap:wrap; }
.layout-more { font-size:11px; color:#8A8296; margin-left:2px; }
.mini-missing { width:16px; height:16px; border-radius:50%; border: 1px dashed var(--danger); }
.layout-info { flex:1; min-width:0; }
.layout-name { font-size:13.5px; font-weight:500; }

@media (max-width: 820px) {
  .app { flex-direction: column; }
  .sidebar { width:100%; flex-direction:row; align-items:center; }
  .beadnav { flex-direction:row; }
  .thread { display:none; }
  .bead-label { display:none; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .two-col { grid-template-columns: 1fr; }
  .main { padding: 20px; }
}
